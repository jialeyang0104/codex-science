name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. desktop-v0.1.0"
        required: true
        default: "desktop-v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-14
            command: npm run dist:mac
          - platform: windows
            os: windows-latest
            command: npm run dist:win

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-science-${{ matrix.platform }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/**/* --clobber
          else
            gh release create "$TAG" artifacts/**/* \
              --title "Codex Science Desktop ${TAG}" \
              --notes-file desktop/RELEASE_NOTES.md
          fi
